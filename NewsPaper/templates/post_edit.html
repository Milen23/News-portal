{% extends "flatpages/default.html" %}

{% block content %}
    <h1>{% if object %}Редактирование{% else %}Создание{% endif %} {{ post_type }}</h1>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}  <!-- Это должно показывать все поля, включая categories -->

        <button type="submit" class="btn btn-primary">
            {% if object %}Сохранить изменения{% else %}Создать{% endif %}
        </button>

        <a href="{% url 'news_list' %}" class="btn btn-secondary">Отмена</a>
    </form>

    <script>
        // Для отладки: проверяем, что поле categories есть в форме
        console.log("Поля формы:", {{ form.fields.keys|safe }});
    </script>
{% endblock %}
